<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <!-- Cream background -->
  <rect width="24" height="24" fill="#f4f1e8"/>

  <!-- Inset the mark with generous padding/whitespace around it -->
  <g transform="translate(5,4)">
    <!-- Chunky black outline (the "drawn pixel" look) -->
    <g fill="#0a0a0a">
      <rect x="1" y="1" width="11" height="1"/>
      <rect x="1" y="1" width="1" height="14"/>
      <rect x="11" y="1" width="1" height="8"/>
      <rect x="1" y="8" width="11" height="1"/>
      <rect x="1" y="14" width="4" height="1"/>
      <rect x="4" y="1" width="1" height="14"/>
    </g>

    <!-- Cyan P body -->
    <g fill="#00f5ff">
      <!-- vertical stem -->
      <rect x="2" y="2" width="2" height="12"/>
      <!-- top bar of bowl -->
      <rect x="5" y="2" width="6" height="2"/>
      <!-- right side of bowl -->
      <rect x="9" y="4" width="2" height="2"/>
      <!-- bottom of bowl -->
      <rect x="5" y="6" width="6" height="2"/>
    </g>
  </g>
</svg>
